<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(r) {
    return Promise.all(r.map(function(x){return x.unregister();}));
  }).then(function() {
    return caches.keys().then(function(k){return Promise.all(k.map(function(c){return caches.delete(c);}));});
  }).finally(function(){ window.location.replace('hf2025.html'); });
} else { window.location.replace('hf2025.html'); }
</script>
</body>
</html>
